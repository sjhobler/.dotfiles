# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """$directory$character"""
right_format = """$all"""

# Custom orange/gray palette
palette = "orange_gray"

[username]
show_always = false
style_user = "bold orange"
style_root = "bold red"

[character]
success_symbol = "[[❯](orange) ](gray)"
error_symbol = "[[✗](red) ❯](gray)"
vimcmd_symbol = "[[ ❮](orange) ](gray)"

[git_branch]
style = "bold gray"
format = '[ $symbol$branch(:$remote_branch)]($style)'
symbol = " "

[git_status]
style = "orange"
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
staged = '[+${count}](green)'
modified = '[!${count}](yellow)'
untracked = '[?${count}](red)'
deleted = '[-${count}](red)'
conflicted = '[=${count}](red)'

[git_metrics]
disabled = false
added_style = "green"
deleted_style = "red"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

[directory]
truncation_length = 4
truncation_symbol = "…/"
style = "bold orange"

[julia]
style = "bold orange"
symbol = '∴ '
disabled = true

[aws]
disabled = true

[cmd_duration]
min_time = 500
format = "took [$duration]($style)"
style = "yellow"

[nodejs]
style = "green"
format = "via [$symbol($version )]($style)"
disabled = true

[python]
style = "blue"
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'

# Orange/Gray palette definition
[palettes.orange_gray]
orange = "#ffa066"
gray = "#727169"
light_gray = "#9399b2"
dark_gray = "#45475a"
red = "#c34043"
green = "#76946a"
yellow = "#c0a36e"
blue = "#7e9cd8"
white = "#dcd7ba"
